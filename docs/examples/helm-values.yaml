# docs/examples/helm-values.yaml
#
# Example per-app Helm values override.
#
# Usage:
#   1. Copy to kubernetes/helm/values/<app-name>-<env>.yaml
#   2. Adjust only the keys that differ from chart defaults
#      (kubernetes/helm/sample-app/values.yaml)
#   3. Reference from your ArgoCD Application under spec.source.helm.valueFiles
#
# Convention:
#   kubernetes/helm/values/<app-name>-dev.yaml
#   kubernetes/helm/values/<app-name>-staging.yaml
#   kubernetes/helm/values/<app-name>-prod.yaml
#
# Secrets:
#   Do NOT put secrets here. Use an ExternalSecret instead.
#   See docs/examples/external-secret.yaml.

nameOverride: "<app-name>"

image:
  repository: ghcr.io/podyourlife/<app-name>
  pullPolicy: Always
  tag: "latest"               # overridden by ArgoCD Image Updater in CI

imagePullSecrets:
  - name: ghcr-pull-secret

# ── Secret injection via ESO ───────────────────────────────────────────────────
# ESO syncs the secret from AWS Secrets Manager into a native Kubernetes Secret.
# Set enabled: true and point to the secret name ESO created.
# See docs/examples/external-secret.yaml for the ExternalSecret manifest.
secret:
  enabled: true
  name: <app-name>-secret      # must match ExternalSecret .spec.target.name

# ── Observability ──────────────────────────────────────────────────────────────
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

# ── Resources — tune per env ───────────────────────────────────────────────────
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# ── Autoscaling ────────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Probes — adjust paths to your app's health endpoints ──────────────────────
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# ── Anti-affinity — spread pods across nodes ──────────────────────────────────
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - <app-name>
          topologyKey: kubernetes.io/hostname

# ── GPU workload (optional) ───────────────────────────────────────────────────
# Uncomment to schedule on GPU nodes (g4dn.xlarge SPOT, taint nvidia.com/gpu=true).
# Requires platform-bot app add --type gpu-workload.
#
# nodeSelector:
#   node-group: gpu
#
# tolerations:
#   - key: nvidia.com/gpu
#     operator: Equal
#     value: "true"
#     effect: NoSchedule
#
# resources:
#   limits:
#     nvidia.com/gpu: 1
