# docs/examples/argocd-application.yaml
#
# Example ArgoCD Application for a product app on the PodYourLife platform.
#
# Usage:
#   1. Copy to argocd/applications/<app-name>.yaml
#   2. Replace all <app-name> / <namespace> occurrences
#   3. Add a values file at kubernetes/helm/values/<app-name>-<env>.yaml
#   4. Commit — ArgoCD picks it up automatically
#
# Or let platform-bot generate this for you:
#   platform-bot app add --name <app-name> --namespace development
#
# Projects:
#   applications  → product apps (development / staging / production)
#   platform      → infra (Istio, monitoring, ESO) — platform-team only
#
# Secret injection:
#   Secrets come from AWS Secrets Manager via ESO — NOT from Helm values.
#   See docs/examples/external-secret.yaml for the ExternalSecret pattern.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: <app-name>
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: <app-name>
    app.kubernetes.io/part-of: applications
spec:
  project: applications

  source:
    repoURL: __REPO_URL__
    targetRevision: main            # pin to a tag for production: v1.2.3
    path: kubernetes/helm/sample-app
    helm:
      valueFiles:
        - values.yaml                              # chart defaults
        - ../../values/<app-name>-dev.yaml         # app overrides (dev)
        # Swap suffix per env: -staging.yaml / -prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: development          # development | staging | production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false       # namespaces are managed by the platform
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas             # HPA owns replica count — ignore drift
