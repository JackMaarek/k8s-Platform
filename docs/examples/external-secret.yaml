# docs/examples/external-secret.yaml
#
# ExternalSecret — pulls a secret from AWS Secrets Manager into the cluster.
#
# Usage:
#   1. Push your secret to AWS SM first:
#        platform-bot secret add --name <app-name>/<key> --value <value>
#      Or manually:
#        aws secretsmanager create-secret \
#          --name <cluster-name>/<app-name>/<key> \
#          --secret-string '{"DB_PASSWORD":"xxx","API_KEY":"yyy"}'
#
#   2. Copy this file to kubernetes/secrets/<namespace>/<app-name>.yaml
#   3. Commit — ArgoCD syncs → ESO creates the native Kubernetes Secret
#   4. Reference in helm-values.yaml: secret.enabled=true, secret.name=<app-name>-secret
#
# SM path convention:
#   <cluster-name>/<namespace>/<app-name>
#   e.g. dev-k8s/development/lpcdm
#
# The ClusterSecretStore (aws-secrets-manager) is provisioned by the platform.
# ESO IRSA role is in terraform/_core/shared/{env}/iam.tf → module irsa_eso.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: <app-name>-secret
  namespace: <namespace>          # development | staging | production
spec:
  refreshInterval: 1h             # how often ESO polls AWS SM

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: <app-name>-secret       # name of the Kubernetes Secret to create
    creationPolicy: Owner         # ESO owns the secret lifecycle

  # Option A — map individual keys from a JSON secret
  data:
    - secretKey: DB_PASSWORD      # key in the Kubernetes Secret
      remoteRef:
        key: <cluster-name>/<namespace>/<app-name>   # path in AWS SM
        property: DB_PASSWORD     # field inside the JSON secret

    - secretKey: API_KEY
      remoteRef:
        key: <cluster-name>/<namespace>/<app-name>
        property: API_KEY

  # Option B — pull all keys from a JSON secret at once (comment out data: above)
  # dataFrom:
  #   - extract:
  #       key: <cluster-name>/<namespace>/<app-name>
