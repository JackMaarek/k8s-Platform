# Wave 6 — after prometheus (wave 4):
# ServiceMonitor CRD must exist before applying these resources

# This ApplicationSet is intentionally minimal in the template — it covers
# the sample-app fixture used to validate the infra during bootstrap.
#
# When platform-bot onboards a new app with --monitor, it generates a
# ServiceMonitor manifest in kubernetes/manifests/<namespace>/servicemonitors/
# and commits it to the target repo. ArgoCD prune: true will pick it up
# automatically on the next sync — no changes needed here.
#
# Wave 6 — ServiceMonitor CRD must exist (prometheus wave 4) before this syncs
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: development-servicemonitors
  namespace: argocd
spec:
  goTemplate: true
  # --- Environment registry ---
  # To activate an env: set enabled: "true"
  # To deactivate: set enabled: "false" — ArgoCD stops generating the Application and prunes it.
  # cloud: identifies the provider (aws | gcp | azure) — used by platform-bot and future multi-cloud selectors.
  # No other file to touch.
  generators:
    - list:
        elements:
          - env: dev
            enabled: "true"
            cloud: aws
            targetRevision: dev
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_DEV__
            awsRegion: eu-west-3
          - env: staging
            enabled: "false"
            cloud: aws
            targetRevision: staging
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_STAGING__
            awsRegion: eu-west-3
          - env: prod
            enabled: "false"
            cloud: aws
            targetRevision: main
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_PROD__
            awsRegion: eu-west-3
  selector:
    matchExpressions:
      - key: enabled
        operator: In
        values: ["true"]
  template:
    metadata:
      name: 'development-servicemonitors-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "6"
    spec:
      project: platform
      source:
        repoURL: https://github.com/PodYourLife/k8s-platform.git
        targetRevision: '{{.targetRevision}}'
        path: kubernetes/manifests/development/servicemonitors
      destination:
        server: https://kubernetes.default.svc
        namespace: development
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
