# Deploys ServiceMonitors for ArgoCD components
# Covers: argocd-metrics, argocd-server-metrics, argocd-repo-server
# ServiceMonitors live in the argocd namespace but are scraped by Prometheus
# in the monitoring namespace (cross-namespace scraping enabled via namespaceSelector: any: true)
#
# Wave 6 — after prometheus (wave 4):
# ServiceMonitor CRD must exist before applying these resources
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argocd-servicemonitors
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: __ENV__
            targetRevision: __TARGET_REVISION__
            awsRegion: __AWS_REGION__
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN__
  template:
    metadata:
      name: 'argocd-servicemonitors-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "6"
    spec:
      project: platform
      source:
        repoURL: https://github.com/PodYourLife/k8s-platform.git
        targetRevision: '{{.targetRevision}}'
        path: kubernetes/manifests/argocd/servicemonitors
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
