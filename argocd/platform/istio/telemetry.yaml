# Deploys Istio telemetry config — enables istio_* metrics for Prometheus
# Depends on: istiod, istio-security
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: istio-telemetry
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: __ENV__
            targetRevision: __TARGET_REVISION__
            awsRegion: __AWS_REGION__
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN__
  template:
    metadata:
      name: 'istio-telemetry-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: platform
      source:
        repoURL: https://github.com/PodYourLife/k8s-platform.git
        targetRevision: '{{.targetRevision}}'
        path: istio/telemetry
      destination:
        server: https://kubernetes.default.svc
        namespace: istio-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
