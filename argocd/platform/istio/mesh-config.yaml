# Deploys Istio traffic management config via the internal Helm chart
# Generates VirtualServices, DestinationRules and AuthorizationPolicies
# from the app list defined in istio/helm/values.yaml
# To add a new app to the mesh: edit istio/helm/values.yaml
# Depends on: istio-gateway, istio-security
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: istio-mesh-config
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: __ENV__
            targetRevision: __TARGET_REVISION__
            awsRegion: __AWS_REGION__
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN__
  template:
    metadata:
      name: 'istio-mesh-config-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: platform
      source:
        repoURL: https://github.com/PodYourLife/k8s-platform.git
        targetRevision: '{{.targetRevision}}'
        path: istio/helm
      destination:
        server: https://kubernetes.default.svc
        namespace: istio-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
