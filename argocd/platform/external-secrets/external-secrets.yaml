# External Secrets Operator — bridge between Kubernetes and AWS Secrets Manager
# Wave -1 — must be ready before any ExternalSecret resource is synced
# IRSA annotation on the ESO service account is injected per-env via the generator
# SecretStore is created post-install by platform-bot new-cluster
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: __ENV__
            targetRevision: __TARGET_REVISION__
            awsRegion: __AWS_REGION__
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN__
  template:
    metadata:
      name: 'external-secrets-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: platform
      source:
        repoURL: https://charts.external-secrets.io
        targetRevision: 0.10.7
        chart: external-secrets
        helm:
          values: |
            installCRDs: true
            webhook:
              create: true
            certController:
              create: true
            serviceAccount:
              annotations:
                eks.amazonaws.com/role-arn: '{{.esoIrsaRoleArn}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
