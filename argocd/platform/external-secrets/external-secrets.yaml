# External Secrets Operator — bridge between Kubernetes and AWS Secrets Manager
# Wave -1 — must be ready before any ExternalSecret resource is synced
# IRSA annotation on the ESO service account is injected per-env via the generator
# SecretStore is created post-install by platform-bot new-cluster
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets
  namespace: argocd
spec:
  goTemplate: true
  # --- Environment registry ---
  # To activate an env: set enabled: "true"
  # To deactivate: set enabled: "false" — ArgoCD stops generating the Application and prunes it.
  # cloud: identifies the provider (aws | gcp | azure) — used by platform-bot and future multi-cloud selectors.
  # No other file to touch.
  generators:
    - list:
        elements:
          - env: dev
            enabled: "true"
            cloud: aws
            targetRevision: dev
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_DEV__
            awsRegion: eu-west-3
          - env: staging
            enabled: "false"
            cloud: aws
            targetRevision: staging
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_STAGING__
            awsRegion: eu-west-3
          - env: prod
            enabled: "false"
            cloud: aws
            targetRevision: main
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_PROD__
            awsRegion: eu-west-3
  selector:
    matchExpressions:
      - key: enabled
        operator: In
        values: ["true"]
  template:
    metadata:
      name: 'external-secrets-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: platform
      source:
        repoURL: https://charts.external-secrets.io
        targetRevision: 0.10.7
        chart: external-secrets
        helm:
          values: |
            installCRDs: true
            webhook:
              create: true
            certController:
              create: true
            serviceAccount:
              annotations:
                eks.amazonaws.com/role-arn: '{{.esoIrsaRoleArn}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
