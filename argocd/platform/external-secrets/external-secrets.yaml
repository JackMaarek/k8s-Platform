# External Secrets Operator — bridge between Kubernetes and AWS Secrets Manager
# Wave -1 — must be ready before any ExternalSecret resource is synced
# IRSA annotation on the ESO service account is set via Helm values
# SecretStore is created post-install by platform-bot new-cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform

  source:
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.10.7
    chart: external-secrets
    helm:
      values: |
        installCRDs: true
        webhook:
          create: true
        certController:
          create: true
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: __ESO_IRSA_ROLE_ARN__

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
