# Installs kube-prometheus-stack: Prometheus, Grafana, AlertManager, node-exporter, kube-state-metrics
# Values file: kubernetes/helm/monitoring/prometheus-values.yaml
# Grafana admin credentials come from SealedSecret grafana-admin-credentials (sealed at bootstrap)
#
# Wave 4 — after Istio (wave 0-3) and after namespaces (wave -3):
# monitoring namespace must have istio-injection: disabled before this syncs
# otherwise admission-create Job gets a sidecar and blocks forever
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: dev
            targetRevision: dev
            awsRegion: eu-west-3
            esoIrsaRoleArn: ""
  template:
    metadata:
      name: 'prometheus-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "4"
    spec:
      project: platform
      sources:
        - repoURL: https://prometheus-community.github.io/helm-charts
          chart: kube-prometheus-stack
          targetRevision: 82.4.2
          helm:
            releaseName: prometheus
            valueFiles:
              - $values/kubernetes/helm/monitoring/prometheus-values.yaml
        - repoURL: https://github.com/PodYourLife/k8s-platform.git
          targetRevision: '{{.targetRevision}}'
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true
