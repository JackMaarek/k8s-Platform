# Deploys Grafana datasource ConfigMaps
# Grafana sidecar watches for ConfigMaps with label grafana_datasource=1
# and loads them automatically — no Grafana restart needed
# Datasources: Prometheus (default) and Loki
# Note: datasources are also defined in prometheus-values.yaml
# This ConfigMap is the authoritative source and overrides Helm values on load
#
# Wave 7 — after prometheus (wave 4):
# Grafana pod must exist before datasources can be hot-reloaded by the sidecar
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana-datasources
  namespace: argocd
spec:
  goTemplate: true
  # --- Environment registry ---
  # To activate an env: set enabled: "true"
  # To deactivate: set enabled: "false" — ArgoCD stops generating the Application and prunes it.
  # cloud: identifies the provider (aws | gcp | azure) — used by platform-bot and future multi-cloud selectors.
  # No other file to touch.
  generators:
    - list:
        elements:
          - env: dev
            enabled: "true"
            cloud: aws
            targetRevision: dev
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_DEV__
            awsRegion: eu-west-3
          - env: staging
            enabled: "false"
            cloud: aws
            targetRevision: staging
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_STAGING__
            awsRegion: eu-west-3
          - env: prod
            enabled: "false"
            cloud: aws
            targetRevision: main
            esoIrsaRoleArn: __ESO_IRSA_ROLE_ARN_PROD__
            awsRegion: eu-west-3
  selector:
    matchExpressions:
      - key: enabled
        operator: In
        values: ["true"]
  template:
    metadata:
      name: 'grafana-datasources-{{.env}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "7"
    spec:
      project: platform
      source:
        repoURL: https://github.com/PodYourLife/k8s-platform.git
        targetRevision: '{{.targetRevision}}'
        path: kubernetes/manifests/monitoring/datasources
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
