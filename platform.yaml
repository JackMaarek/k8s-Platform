# platform.yaml — source of truth for PodYourLife k8s-platform
#
# Versions, region, and enabled flag are per-environment.
# platform-bot reads this file and propagates values to:
#   - terraform/_core/shared/<env>/terraform.tfvars   (kubernetes_version)
#   - terraform/_core/shared/<env>/variables.tf        (kubernetes_version default)
#   - terraform/_core/modules/aws/eks/variables.tf     (kubernetes_version default)
#   - scripts/lib/minikube.sh                          (K8S_VERSION)
#   - argocd/platform/istio/{base,cni,istiod,gateway}.yaml  (targetRevision)
#   - argocd/platform/**/*.yaml                        (enabled, awsRegion in generators)
#   - kubernetes/secrets/<env>/secret-store.yaml       (region, generated from template)
environments:
  dev:
    enabled: true
    region: eu-west-3
    kubernetes_version: "1.33"
    istio_version: "1.27.1"
  staging:
    enabled: false
    region: eu-west-3
    kubernetes_version: "1.33"
    istio_version: "1.27.1"
  prod:
    enabled: false
    region: eu-west-3
    kubernetes_version: "1.33"
    istio_version: "1.27.1"
